<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Juegos.com</title>
  </head>
  <body>
        <div id="login-page" class="container-fluid">
            <div class="row">
                <h1>¡Bienvenid@!</h1>
                <h2>¿Quién va a jugar hoy?</h2>
                <div class="form-group">
                    <input type="text" id="userName" class="form-control user-name" placeholder="Ingresa tu nombre">
                    <audio id="userVacioAudio" src="./audios/mgs_alert.mp3"></audio>
                    <button type="submit" class="btn btn-primary" id="btn-ingresar">Ingresar</button>
                </div>
            </div>
        </div>
        <main id="main-page">
            <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
                <a class="navbar-brand" href="#">Juegos.com</a>
                <button class="navbar-toggler collapsed" type="button" data-toggle="collapse" data-target="#navbarsExample03" aria-controls="navbarsExample03" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-collapse collapse" id="navbarsExample03">
                    <ul class="navbar-nav mr-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Ta Te Ti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#">Ahorcado</a>
                        </li>
                    </ul>
                    <div class="nav-item dropdown" id="userMenu">
                        <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            <span id="userWelcome"></span>
                            <span class="navbar-toggler-icon"></span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu" style="right: 0; left: auto;">
                            <a class="dropdown-item" href="#" id="btn-reset-stats">Reiniciar estadísticas</a>
                            <a class="dropdown-item" href="#" id="btn-logout">Cerrar sesión</a>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="container">
                <div class="row">
                    <h2 class="title text-center">Ta Te Ti</h2>
                </div>
                <div class="row">
                    <div class="col">
                        <div class="jugadores">
                            <audio id="sorpresaAudio" src="./audios/sorpresa.mp3"></audio>
                            <div class="form-group">
                                <label for="player1">Jugador 1 - X</label>
                                <div class="form-nombre">
                                    <input type="text" id="player1Name" class="form-control player-name" placeholder="Nombre del primer jugador">
                                    <button class="btn btn-secondary btn-sorpresa" id="btn-sorpresa-1">Sorpresa!</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="player2">Jugador 2 - O</label>
                                <div class="form-nombre">
                                    <input type="text" id="player2Name" class="form-control player-name" placeholder="Nombre del segundo jugador">
                                    <button class="btn btn-secondary btn-sorpresa" id="btn-sorpresa-2">Sorpresa!</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <audio id="limpiarAudio" src="./audios/limpiar.mp3"></audio>
                                <button type="submit" class="btn btn-primary" id="btn-limpiar">Limpiar</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-5">
                        <div id="tablero">
                            <table>
                                <tr>
                                    <td class="celda"></th>
                                    <td class="celda"></th>
                                    <td class="celda"></th>
                                </tr>
                                <tr>
                                    <td class="celda"></td>
                                    <td class="celda"></td>
                                    <td class="celda"></td>
                                </tr>
                                <tr>
                                    <td class="celda"></td>
                                    <td class="celda"></td>
                                    <td class="celda"></td>
                                </tr>
                            </table>
                        </div>
                    </div>
                    <div class="col"></div>
                </div>
                <div class="row">
                    <div class="mensajes">
                        <audio id="ganadorAudio" src="./audios/win.mp3"></audio>
                        <h3 id="turno" class="mx-auto">Haz click en cualquier parte del tablero para iniciar</h3>
                        <h5><small class="mx-auto text-muted">Si no se ingresan nombres para los jugadores, se seleccionarán nombres aleatorios</small></h5>
                    </div>
                </div>
                <div class="row reiniciar-juego">
                    <button type="button" class="btn btn-primary" id="btn-reiniciar">Reiniciar juego</button>
                </div>
            </div>
        </main>
    <script src="./js/script.js"></script>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  </body>
</html>
